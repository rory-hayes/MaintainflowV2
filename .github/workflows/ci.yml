name: Quality gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUSINESS_EVALS_TEST_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          package-manager-cache: false

      - name: Install pinned pnpm
        run: npm install --global pnpm@11.5.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependency tree
        run: pnpm audit

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test database migrations
        run: pnpm test:business-evals:database

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test Business Evals journeys
        run: pnpm test:business-evals:e2e

      - name: Build canary route tree
        env:
          NEXT_PUBLIC_BUSINESS_EVALS_UI: "false"
          BUSINESS_EVALS_WORKSPACE_ALLOWLIST: "00000000-0000-4000-8000-000000000099"
          BUSINESS_EVALS_PREVIEW: "0"
        run: pnpm build
